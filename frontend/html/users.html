<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Usuarios - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/users.css">
</head>

<body onload="initUsers()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="logo">🏥 HealthNet</div>

  <div onclick="location.href='dashboard.html'">🏠 Inicio</div>
  <div onclick="location.href='diagnostico.html'">🧠 Diagnóstico IA</div>
  <div onclick="location.href='pacientes.html'">👥 Pacientes</div>
  <div onclick="location.href='historial.html'">📋 Historial</div>
  <div onclick="location.href='users.html'">👤 Usuarios</div>
  <div onclick="logout()">🚪 Cerrar sesión</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="card">

    <h3>👤 Gestión de Usuarios</h3>

    <div class="filtros-grid">

      <input id="buscarUsuario" placeholder="Buscar usuario...">

      <select id="filtroRol">
        <option value="">Todos los roles</option>
        <option value="admin">Administrador</option>
        <option value="doctor">Doctor</option>
        <option value="especialista">Especialista</option>
      </select>

      <button onclick="cargarUsuarios()">🔍 Buscar</button>

    </div>

  </div>

  <!-- LISTA -->
  <div id="listaUsuarios"></div>

</div>

<!-- SCRIPTS (ORDEN FASE 3) -->
<script src="../js/proteccion.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/users.js"></script>

<script>
function initUsers() {

  // 🔐 SEGURIDAD CENTRALIZADA
  if (!proteger("users")) return;

  cargarUsuario();

  if (typeof cargarUsuarios === "function") {
    cargarUsuarios();
  }
}
</script>

</body>
</html>
