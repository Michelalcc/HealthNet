<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Usuarios - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/users.css">
</head>

<body onload="initUsers()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="card">
    <h2>Gestión de Usuarios</h2>

    <div id="listaUsuarios"></div>
  </div>

</div>

<!-- SCRIPTS -->
<script src="../js/layout.js"></script>
<script src="../js/proteccion.js"></script>
<script src="../js/users.js"></script>

<script>
function initUsers() {

  // 🔐 SEGURIDAD FASE 3 (OBLIGATORIO)
  proteger("users");

  // 🚨 EXTRA: doble control de seguridad (solo admin)
  const user = JSON.parse(localStorage.getItem("usuario"));

  if (!user || user.rol !== "admin") {
    window.location.href = "/html/dashboard.html";
    return;
  }

  // 👤 cargar usuario UI
  cargarUsuario();

  // 📦 cargar usuarios
  if (typeof cargarUsuarios === "function") {
    cargarUsuarios();
  }

  // 🎯 marcar activo menú
  if (typeof marcarActivo === "function") {
    marcarActivo("users");
  }
}
</script>

</body>
</html>
