<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Usuarios - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/users.css">

</head>

<body onload="initUsers()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>

  </div>

  <!-- TÍTULO -->
  <div class="card">
    <h2>👤 Gestión de Usuarios</h2>
    <p>Administración de roles y accesos del sistema</p>
  </div>

  <!-- LISTA USUARIOS -->
  <div class="card">

    <h3>Usuarios Registrados</h3>

    <div id="listaUsuarios"></div>

  </div>

  <!-- CREAR USUARIO -->
  <div class="card">

    <h3>➕ Crear Usuario</h3>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Contraseña">

    <select id="rol">
      <option value="doctor">Doctor</option>
      <option value="especialista">Especialista</option>
      <option value="admin">Admin</option>
    </select>

    <button onclick="crearUsuario()">Crear Usuario</button>

  </div>

</div>

<!-- SCRIPTS -->
<script src="../js/layout.js"></script>
<script src="../js/proteccion.js"></script>
<script src="../js/users.js"></script>

<script>
function initUsers() {

  // 🔐 solo admin
  initPagina("users");

  // 👤 usuario
  cargarUsuario();

  // 👥 cargar usuarios
  if (typeof cargarUsuarios === "function") {
    cargarUsuarios();
  }
}
</script>

</body>
</html>
