<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Historial Clínico - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/historial.css">

</head>

<body onload="initHistorial()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>

  </div>

  <!-- BOTÓN EXPORTAR -->
  <button onclick="descargarPDFGeneral()" style="margin: 10px 0;">
    📊 Descargar Historial Completo
  </button>

  <!-- FILTROS -->
  <div class="card filtros">

    <h3>Filtros Clínicos</h3>

    <div class="grid-filtros">

      <input id="fNombre" placeholder="Nombre paciente">
      
      <select id="fGenero">
        <option value="">Género</option>
        <option>Masculino</option>
        <option>Femenino</option>
      </select>

      <input id="fHospital" placeholder="Hospital">

      <input id="fDoctor" placeholder="Doctor">

      <select id="orden">
        <option value="reciente">Más reciente</option>
        <option value="antiguo">Más antiguo</option>
        <option value="prob">Mayor probabilidad</option>
      </select>

      <button onclick="aplicarFiltros()">🔍 Buscar</button>

    </div>

  </div>

  <!-- RESULTADOS -->
  <div id="listaHistorial"></div>

</div>

<!-- SCRIPTS -->
<script src="../js/layout.js"></script>
<script src="../js/proteccion.js"></script>
<script src="../js/historial.js"></script>

<script>
function initHistorial() {

  // 🔐 seguridad centralizada
  initPagina("historial");

  // 👤 usuario
  cargarUsuario();

  // 📋 carga historial
  cargarHistorial();
}
</script>

</body>
</html>
