<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Pacientes - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/pacientes.css">

</head>

<body onload="initPacientes()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>

  </div>

  <!-- FILTROS -->
  <div class="filtro-bar card">

    <input type="text" id="buscarPaciente" placeholder="Buscar paciente...">

    <select id="filtroGenero">
      <option value="">Todos</option>
      <option value="Masculino">Masculino</option>
      <option value="Femenino">Femenino</option>
    </select>

    <select id="ordenar">
      <option value="">Ordenar</option>
      <option value="az">A - Z</option>
      <option value="za">Z - A</option>
    </select>

    <button onclick="aplicarFiltros()">🔍</button>

  </div>

  <!-- LISTA -->
  <div id="listaPacientes"></div>

</div>

<!-- SCRIPTS -->
<script src="../js/layout.js"></script>
<script src="../js/proteccion.js"></script>
<script src="../js/pacientes.js"></script>

<script>
function initPacientes() {

  // 🔐 seguridad centralizada
  initPagina("pacientes");

  // 👤 usuario
  cargarUsuario();

  // 👥 carga inicial
  if (typeof cargarPacientes === "function") {
    cargarPacientes();
  }
}
</script>

</body>
</html>
