<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Hospitales - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/hospitales.css">
</head>

<body onload="initHospitales()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="logo">🏥 HealthNet</div>

  <div onclick="location.href='dashboard.html'">🏠 Inicio</div>
  <div onclick="location.href='diagnostico.html'">🧠 Diagnóstico IA</div>
  <div onclick="location.href='pacientes.html'">👥 Pacientes</div>
  <div onclick="location.href='historial.html'">📋 Historial</div>
  <div onclick="location.href='users.html'">👤 Usuarios</div>
  <div onclick="location.href='hospitales.html'">🏥 Hospitales</div>
  <div onclick="logout()">🚪 Cerrar sesión</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="card">

    <h3>🏥 Gestión de Hospitales</h3>

    <div class="filtros-grid">

      <input id="buscarHospital" placeholder="Buscar hospital...">

      <select id="ordenHospital">
        <option value="az">A - Z</option>
        <option value="za">Z - A</option>
      </select>

      <button onclick="cargarHospitales()">🔍 Buscar</button>

    </div>

  </div>

  <!-- LISTA -->
  <div id="listaHospitales"></div>

</div>

<!-- SCRIPTS (ORDEN FASE 3) -->
<script src="../js/proteccion.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/hospitales.js"></script>

<script>
function initHospitales() {

  // 🔐 SEGURIDAD CENTRALIZADA
  if (!proteger("hospitales")) return;

  cargarUsuario();

  if (typeof cargarHospitales === "function") {
    cargarHospitales();
  }
}
</script>

</body>
</html>
