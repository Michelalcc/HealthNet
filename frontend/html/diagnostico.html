<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Diagnóstico - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">

<style>

/* =========================
   FONDO CLÍNICO PROFESIONAL
========================= */

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url("../assets/imagenes/fondo_diagnostico.png") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(244, 246, 249, 0.85);
  z-index: -1;
}

/* =========================
   LAYOUT
========================= */

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
}

/* =========================
   CARDS
========================= */

.card {
  background: rgba(255,255,255,0.95);
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

/* =========================
   BARRA
========================= */

.barra-container {
  width: 100%;
  height: 22px;
  background: #e0e0e0;
  border-radius: 12px;
  overflow: hidden;
}

#barra {
  height: 100%;
  width: 0%;
  transition: 0.5s;
}

.verde { background: #28a745; }
.amarillo { background: #ffc107; }
.rojo { background: #dc3545; }

button {
  background: #1f3b57;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #2c5d85;
}

</style>

</head>

<body onload="initDiagnostico()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="container">

    <!-- IZQUIERDA -->
    <div>

      <div class="card">
        <h3>Subir Imagen Médica</h3>
        <input type="file" id="imageInput"><br><br>
        <img id="preview" width="100%">
        <br><br>
        <button onclick="analizar()">Analizar IA</button>
      </div>

      <div class="card" id="resultadoCard"></div>

      <div class="card">
        <h3>Probabilidad</h3>
        <div class="barra-container">
          <div id="barra"></div>
        </div>
      </div>

    </div>

    <!-- DERECHA -->
    <div>

      <div class="card" id="pacienteCard"></div>

      <div class="card" id="recomendacionCard"></div>

      <div class="card">

        <h3>Evaluación Clínica</h3>

        <button onclick="setFibroma(true)">Sí Fibroma</button>
        <button onclick="setFibroma(false)">No Fibroma</button>

        <div id="nivelFibroma" class="hidden">
          <br>
          <select id="nivel">
            <option value="leve">Leve</option>
            <option value="moderado">Moderado</option>
            <option value="avanzado">Avanzado</option>
          </select>
        </div>

      </div>

      <button onclick="guardarDiagnostico()">Guardar Diagnóstico</button>

    </div>

  </div>

</div>

<!-- SCRIPTS -->
<script src="../js/layout.js"></script>
<script src="../js/proteccion.js"></script>
<script src="../js/ia.js"></script>

<script>
function initDiagnostico() {

  // 🔐 seguridad centralizada
  initPagina("diagnostico");

  // 👤 usuario
  cargarUsuario();

  // 🧠 inicialización IA si existe
  if (typeof cargarIA === "function") {
    cargarIA();
  }
}
</script>

</body>
</html>
