<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Reportes - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/reportes.css">
</head>

<body onload="initReportes()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="logo">🏥 HealthNet</div>

  <div onclick="location.href='dashboard.html'">🏠 Inicio</div>
  <div onclick="location.href='diagnostico.html'">🧠 Diagnóstico IA</div>
  <div onclick="location.href='pacientes.html'">👥 Pacientes</div>
  <div onclick="location.href='historial.html'">📋 Historial</div>
  <div onclick="location.href='users.html'">👤 Usuarios</div>
  <div onclick="location.href='hospitales.html'">🏥 Hospitales</div>
  <div onclick="location.href='reportes.html'">📊 Reportes</div>
  <div onclick="logout()">🚪 Cerrar sesión</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="card">

    <h3>📊 Panel de Reportes Clínicos</h3>

    <div class="filtros-grid">

      <select id="tipoReporte">
        <option value="general">General</option>
        <option value="pacientes">Pacientes</option>
        <option value="diagnosticos">Diagnósticos</option>
        <option value="hospitales">Hospitales</option>
      </select>

      <select id="rangoFecha">
        <option value="hoy">Hoy</option>
        <option value="semana">Última semana</option>
        <option value="mes">Último mes</option>
      </select>

      <button onclick="generarReporte()">📈 Generar</button>

    </div>

  </div>

  <!-- RESULTADOS -->
  <div id="contenedorReportes"></div>

</div>

<!-- SCRIPTS (ORDEN FASE 3) -->
<script src="../js/proteccion.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/reportes.js"></script>

<script>
function initReportes() {

  // 🔐 SEGURIDAD CENTRALIZADA
  if (!proteger("reportes")) return;

  cargarUsuario();

  if (typeof cargarReportes === "function") {
    cargarReportes();
  }
}
</script>

</body>
</html>
