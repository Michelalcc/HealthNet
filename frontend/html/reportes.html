<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Reportes - HealthNet</title>

<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/reportes.css">

</head>

<body onload="initReportes()">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <span onclick="toggleMenu()" style="cursor:pointer;">☰</span>

    <div class="user-info">
      <img id="imgUser" width="40">
      <div>
        <div id="nombreUser"></div>
        <small id="rolUser"></small>
      </div>
    </div>

  </div>

  <!-- TÍTULO -->
  <div class="card">
    <h2>📊 Panel de Reportes Clínicos</h2>
    <p>Resumen estadístico del sistema hospitalario</p>
  </div>

  <!-- GRID REPORTES -->
  <div class="grid">

    <div class="card">
      <h3>📈 Pacientes</h3>
      <p id="totalPacientes">--</p>
    </div>

    <div class="card">
      <h3>🧠 Diagnósticos Hoy</h3>
      <p id="diagnosticosHoy">--</p>
    </div>

    <div class="card">
      <h3>🏥 Hospitales Activos</h3>
      <p id="hospitalesActivos">--</p>
    </div>

    <div class="card">
      <h3>👨‍⚕️ Usuarios Activos</h3>
      <p id="usuariosActivos">--</p>
    </div>

  </div>

  <!-- DETALLE -->
  <div class="card">
    <h3>📊 Análisis General</h3>
    <div id="analisisReportes"></div>
  </div>

</div>

<!-- SCRIPTS -->
<script src="../js/layout.js"></script>
<script src="../js/proteccion.js"></script>
<script src="../js/reportes.js"></script>

<script>
function initReportes() {

  // 🔐 seguridad centralizada
  initPagina("reportes");

  // 👤 usuario
  cargarUsuario();

  // 📊 cargar datos del dashboard ejecutivo
  if (typeof cargarReportes === "function") {
    cargarReportes();
  }
}
</script>

</body>
</html>
